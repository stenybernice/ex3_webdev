<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gam3ry | E-sports Registration</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">GAM3RY</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#register">Register</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 mb-4">
                    <h1 class="display-4 fw-bold">Level Up Your Game.</h1>
                    <p class="lead text-secondary">Join the elite gam3ry tournament and compete for the $10k prize pool.</p>
                    <a href="#register" class="btn btn-primary btn-lg px-5 mt-3">Join Now</a>
                </div>
                <div class="col-md-6">
                    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=800&q=80" 
                         alt="Gaming Setup" class="img-fluid rounded-4 shadow-lg">
                </div>
            </div>
        </div>
    </header>

    <main class="container my-5 py-5" id="register">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card p-4 shadow-sm border-secondary">
                    <h2 class="text-center mb-4">Tournament Registration</h2>
                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Gamer Tag</label>
                                <input type="text" class="form-control" placeholder="e.g. ProPlayer_01" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Game Title</label>
                                <select class="form-select">
                                    <option>Valorant</option>
                                    <option>League of Legends</option>
                                    <option>CS2</option>
                                </select>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-outline-info w-100 py-2">Submit Entry</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 border-top border-secondary mt-5">
        <p class="text-secondary small">&copy; 2026 gam3ry E-sports. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
